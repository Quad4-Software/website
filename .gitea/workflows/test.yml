name: Test

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: https://git.quad4.io/actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Setup Node.js
        uses: https://git.quad4.io/actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version: 24

      - name: Setup pnpm
        uses: https://git.quad4.io/actions/setup-pnpm@1e1c8eafbd745f64b1ef30a7d7ed7965034c486c

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit
        run: pnpm audit

      - name: Check
        run: pnpm run check

      - name: Test
        run: pnpm test:run

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: https://git.quad4.io/actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Setup Node.js
        uses: https://git.quad4.io/actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version: 24

      - name: Setup pnpm
        uses: https://git.quad4.io/actions/setup-pnpm@1e1c8eafbd745f64b1ef30a7d7ed7965034c486c

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Determine version
        id: version
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "version=${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Build frontend
        run: pnpm build
        env:
          VITE_APP_VERSION: ${{ steps.version.outputs.version }}
