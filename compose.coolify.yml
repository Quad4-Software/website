services:
  web:
    build: .
    image: quad4-website:latest
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 128M
    environment:
      - NODE_ENV=production
      - PORT=8080
      - HOST=0.0.0.0

  shield:
    image: git.quad4.io/quad4-software/shield:latest
    security_opt:
      - no_new_privileges:true
    labels:
      - traefik.enable=true
      - "traefik.http.routers.quad4-shield.rule=Host(`${DOMAIN:-quad4.io}`) && PathPrefix(`/`)"
      - traefik.http.routers.quad4-shield.entrypoints=web
      - traefik.http.services.quad4-shield.loadbalancer.server.port=8000
    environment:
      - QUAD4_LISTEN=${QUAD4_LISTEN:-:8000}
      - QUAD4_UPSTREAM_URL=${QUAD4_UPSTREAM_URL:-http://web:8080}
      - QUAD4_POW_ENABLED=${QUAD4_POW_ENABLED:-true}
      - QUAD4_POW_SECRET=${QUAD4_POW_SECRET}
      - QUAD4_METRICS_ENABLED=${QUAD4_METRICS_ENABLED:-false}
      - QUAD4_METRICS_KEY=${QUAD4_METRICS_KEY}
      - QUAD4_PERSISTENCE_ENABLED=${QUAD4_PERSISTENCE_ENABLED:-false}
      - QUAD4_PERSISTENCE_DB_PATH=${QUAD4_PERSISTENCE_DB_PATH:-/app/data/quad4.db}
      - QUAD4_UPSTREAM_TLS_SKIP_VERIFY=${QUAD4_UPSTREAM_TLS_SKIP_VERIFY:-false}
    restart: unless-stopped