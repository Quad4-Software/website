services:
  web:
    build: .
    image: quad4-website:latest
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 128M
    environment:
      - NODE_ENV=production
      - PORT=8080
      - HOST=0.0.0.0
