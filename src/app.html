<!doctype html>
<html lang="en" class="dark">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<script>
			(function() {
				var el = document.documentElement;
				el.classList.remove('light', 'dark');
				var params = new URLSearchParams(window.location.search);
				var theme = params.get('theme') === 'light' || params.get('theme') === 'dark' ? params.get('theme') : null;
				if (!theme) theme = localStorage.getItem('theme');
				if (theme === 'light' || theme === 'dark') {
					el.classList.add(theme);
					if (params.get('theme')) localStorage.setItem('theme', theme);
				} else {
					el.classList.add(window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
				}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<noscript>
			<div style="padding:0.75rem 1rem;text-align:center;background:#e5e7eb;color:#374151;font-size:0.875rem">
				This site works without JavaScript. Links and content are available. Some features (theme toggle, client navigation) need JavaScript.
			</div>
		</noscript>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
